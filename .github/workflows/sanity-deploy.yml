name: Deploy on Sanity Content Change

on:
  repository_dispatch:
    types: [sanity-deploy]

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger rebuild via empty commit
        run: |
          git config user.name "sanity-bot"
          git config user.email "bot@indriyaclinic.com"
          git commit --allow-empty -m "chore: rebuild site (Sanity content update)"
          git push
