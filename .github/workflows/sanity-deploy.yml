name: Deploy on Sanity Content Change

on:
  repository_dispatch:
    types: [sanity-deploy]

permissions:
  contents: write

concurrency:
  group: sanity-deploy
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger rebuild
        run: |
          git config user.name "sanity-bot"
          git config user.email "bot@indriyaclinic.com"
          git pull --rebase origin main
          date -u +%Y-%m-%dT%H:%M:%SZ > frontend/.sanity-rebuild
          git add frontend/.sanity-rebuild
          git commit -m "chore: rebuild site (Sanity content update)"
          git push
